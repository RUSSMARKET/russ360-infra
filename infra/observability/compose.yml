name: observability

# ─── Все контейнеры группируются через ─────────────────────────────────
#   1. compose project name: "observability"            → docker ps --filter label=com.docker.compose.project=observability
#   2. container_name prefix: "obs-"                    → видно в любом UI/CLI
#   3. labels stack=observability tier=<category>       → docker ps --filter label=stack=observability
# ───────────────────────────────────────────────────────────────────────

networks:
  default:
    name: observability_net
    driver: bridge

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
  glitchtip_pg_data:
  glitchtip_uploads:

x-common-labels: &common-labels
  stack: observability

x-glitchtip-env: &glitchtip-env
  DATABASE_URL: postgres://glitchtip:${GLITCHTIP_DB_PASSWORD}@obs-glitchtip-postgres:5432/glitchtip
  SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
  REDIS_URL: redis://obs-glitchtip-redis:6379/0
  PORT: "8000"
  EMAIL_URL: ${GLITCHTIP_EMAIL_URL:-consolemail://}
  DEFAULT_FROM_EMAIL: ${GLITCHTIP_DEFAULT_FROM_EMAIL:-glitchtip@localhost}
  GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8050}
  CELERY_WORKER_AUTOSCALE: "1,3"
  CELERY_WORKER_MAX_TASKS_PER_CHILD: "10000"
  ENABLE_USER_REGISTRATION: ${ENABLE_USER_REGISTRATION:-True}

services:

  # ═════════════════════ METRICS ═════════════════════
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: obs-prometheus
    restart: unless-stopped
    user: root
    labels:
      <<: *common-labels
      tier: metrics
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "127.0.0.1:9090:9090"

  node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: obs-node-exporter
    restart: unless-stopped
    pid: host
    network_mode: host
    labels:
      <<: *common-labels
      tier: metrics
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro,rslave
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/.+|var/lib/docker/.+)($$|/)'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: obs-cadvisor
    restart: unless-stopped
    privileged: true
    labels:
      <<: *common-labels
      tier: metrics
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      - '--housekeeping_interval=15s'
      - '--store_container_labels=false'
      - '--whitelisted_container_labels=com.docker.compose.service,com.docker.compose.project'

  # ═════════════════════ LOGS ═════════════════════
  loki:
    image: grafana/loki:3.3.2
    container_name: obs-loki
    restart: unless-stopped
    user: root
    labels:
      <<: *common-labels
      tier: logs
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "127.0.0.1:3100:3100"

  promtail:
    image: grafana/promtail:3.3.2
    container_name: obs-promtail
    restart: unless-stopped
    depends_on: [loki]
    labels:
      <<: *common-labels
      tier: logs
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ${RUSAIFIN_PROD_LOGS:-/tmp/empty-prod}:/var/log/rusaifin-prod:ro
      - ${RUSAIFIN_DEV_LOGS:-/tmp/empty-dev}:/var/log/rusaifin-dev:ro
    command: -config.file=/etc/promtail/promtail-config.yml -config.expand-env=true
    environment:
      HOSTNAME: ${OBS_HOSTNAME:-local}

  # ═════════════════════ UI ═════════════════════
  grafana:
    image: grafana/grafana:11.4.0
    container_name: obs-grafana
    restart: unless-stopped
    depends_on: [prometheus, loki]
    labels:
      <<: *common-labels
      tier: ui
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-http://localhost:3030}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards-json:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3030:3000"

  # ═════════════════════ ERRORS (GlitchTip) ═════════════════════
  glitchtip-postgres:
    image: postgres:16-alpine
    container_name: obs-glitchtip-postgres
    restart: unless-stopped
    labels:
      <<: *common-labels
      tier: errors
    environment:
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${GLITCHTIP_DB_PASSWORD}
      POSTGRES_DB: glitchtip
    volumes:
      - glitchtip_pg_data:/var/lib/postgresql/data

  glitchtip-redis:
    image: redis:7-alpine
    container_name: obs-glitchtip-redis
    restart: unless-stopped
    labels:
      <<: *common-labels
      tier: errors

  glitchtip-migrate:
    image: glitchtip/glitchtip:v4.1
    container_name: obs-glitchtip-migrate
    restart: "no"
    depends_on: [glitchtip-postgres, glitchtip-redis]
    labels:
      <<: *common-labels
      tier: errors
    environment: *glitchtip-env
    command: ./bin/run-migrate.sh

  glitchtip-web:
    image: glitchtip/glitchtip:v4.1
    container_name: obs-glitchtip-web
    restart: unless-stopped
    depends_on:
      glitchtip-postgres:
        condition: service_started
      glitchtip-redis:
        condition: service_started
      glitchtip-migrate:
        condition: service_completed_successfully
    labels:
      <<: *common-labels
      tier: errors
    environment: *glitchtip-env
    volumes:
      - glitchtip_uploads:/code/uploads
    ports:
      - "127.0.0.1:8050:8000"

  glitchtip-worker:
    image: glitchtip/glitchtip:v4.1
    container_name: obs-glitchtip-worker
    restart: unless-stopped
    depends_on:
      glitchtip-postgres:
        condition: service_started
      glitchtip-redis:
        condition: service_started
      glitchtip-migrate:
        condition: service_completed_successfully
    labels:
      <<: *common-labels
      tier: errors
    environment: *glitchtip-env
    command: ./bin/run-celery-with-beat.sh
    volumes:
      - glitchtip_uploads:/code/uploads
