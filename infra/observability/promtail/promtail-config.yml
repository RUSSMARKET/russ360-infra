server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ---------- Docker containers (whitelist по префиксу имени) ----------
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      # Имя контейнера приходит в виде /name.
      # Whitelist: наши приложения + сам observability stack (контейнеры с префиксом obs-).
      - source_labels: ['__meta_docker_container_name']
        regex: '^/((?:rusai|fintech_|obs-).+)$'
        action: keep
      - source_labels: ['__meta_docker_container_name']
        regex: '^/(.*)$'
        target_label: container
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: compose_project
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: compose_service
      - target_label: job
        replacement: docker
      - target_label: host
        replacement: ${HOSTNAME}
    pipeline_stages:
      # Попытка распарсить JSON-логи (Track B даст structured logging).
      - json:
          expressions:
            level: level
            message: message
      - labels:
          level:

  # ---------- rusaifin native (на хосте) — laravel.log ----------
  # Bind mount задаётся через RUSAIFIN_{PROD,DEV}_LOGS в .env.
  # Локально мы биндим /tmp/empty-* (пустые), поэтому job ничего не найдёт — это норма.
  - job_name: rusaifin_prod_laravel
    static_configs:
      - targets: [localhost]
        labels:
          service: rusaifin
          env: prod
          job: laravel
          host: ${HOSTNAME}
          __path__: /var/log/rusaifin-prod/laravel*.log

  - job_name: rusaifin_dev_laravel
    static_configs:
      - targets: [localhost]
        labels:
          service: rusaifin
          env: dev
          job: laravel
          host: ${HOSTNAME}
          __path__: /var/log/rusaifin-dev/laravel*.log
