apiVersion: 1

# Grafana-managed alert rules (provisioned). Datasource uid PBFA97CFB590B2093 = Prometheus
# (see provisioning/datasources/datasources.yml).
#
# Calibrated 2026-06-11 against a 14-day prod baseline. Traffic here is tiny
# (1-10 req/min per service), so percentile rules carry a min-traffic gate
# (`and rate > 0.05` ≈ 3 req/min) — below it a p95 is just the slowest of ~3
# requests and flaps for hours (rusaiauth: 53h above 1s in 14d, all noise).
# SMS-backed routes (recovery/registration) are excluded from latency: their
# p95 (up to ~10s) is the SMS provider's latency, not service health; provider
# failures still surface via the 5xx and exception rules.
groups:
  - orgId: 1
    name: russ360-service-health
    folder: Russ360
    interval: 1m
    rules:
      - uid: russ360-target-down
        title: 'Scrape target down (service unreachable)'
        condition: C
        for: 2m
        noDataState: OK
        execErrState: OK
        labels:
          severity: critical
        annotations:
          summary: '{{ $labels.job }}/{{ $labels.env }}: scrape target down ({{ $labels.instance }})'
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              refId: A
              instant: true
              expr: up
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [1] }

      - uid: russ360-5xx-rate
        title: '5xx rate > 1% (per service)'
        condition: C
        for: 5m
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning
        annotations:
          summary: '{{ $labels.service }}/{{ $labels.env }}: 5xx share {{ printf "%.1f" (mulf $values.A.Value 100) }}% over 10m'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              refId: A
              instant: true
              expr: >
                (
                  sum by (service,env) (rate(russ360_http_requests_total{status=~"5.."}[10m]))
                  /
                  clamp_min(sum by (service,env) (rate(russ360_http_requests_total[10m])), 1e-9)
                )
                and
                (sum by (service,env) (rate(russ360_http_requests_total[10m])) > 0.05)
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0.01] }

      # Recalibrated 2026-07-02 against a 3-day prod baseline: on a 15m window the
      # traffic gate flips ~41% of the time and p95 sits above 2.5s ~10% of the time,
      # so the firing series kept vanishing mid-alert (MissingSeries auto-resolve) and
      # re-firing an hour later — 30m window + 4s threshold cut that to real
      # degradations only (>4s ≈ 3% of the window, >5s ≈ 0%).
      - uid: russ360-latency-p95
        title: 'Request latency p95 > 4s (per service, min 3 req/min over 30m)'
        condition: C
        for: 15m
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning
        annotations:
          summary: '{{ $labels.service }}/{{ $labels.env }}: p95 latency {{ printf "%.2f" $values.A.Value }}s'
        data:
          - refId: A
            relativeTimeRange: { from: 1800, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              refId: A
              instant: true
              expr: >
                (
                  histogram_quantile(0.95, sum by (le,service,env)
                    (rate(russ360_http_request_duration_seconds_bucket{route!~"api/v1/(recovery|registration).*"}[30m])))
                )
                and
                (sum by (service,env) (rate(russ360_http_requests_total{route!~"api/v1/(recovery|registration).*"}[30m])) > 0.05)
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [4] }

      - uid: russ360-exception-rate
        title: 'Exception rate > 5/min (per service)'
        condition: C
        for: 1m
        noDataState: OK
        execErrState: OK
        labels:
          severity: critical
        annotations:
          summary: '{{ $labels.service }}/{{ $labels.env }}: {{ printf "%.0f" $values.A.Value }} exceptions/min (also in GlitchTip)'
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              refId: A
              instant: true
              expr: 'sum by (service,env) (rate(russ360_exceptions_total[1m])) * 60'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [5] }

  - orgId: 1
    name: russ360-host
    folder: Russ360
    interval: 1m
    rules:
      - uid: russ360-disk-80
        title: 'Host disk > 80%'
        condition: C
        for: 5m
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning
        annotations:
          summary: 'Host root filesystem {{ printf "%.0f" $values.A.Value }}% used'
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              refId: A
              instant: true
              expr: >
                100 * (1 - node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"}
                / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"})
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [80] }

      - uid: russ360-disk-95
        title: 'Host disk > 95%'
        condition: C
        for: 2m
        noDataState: OK
        execErrState: OK
        labels:
          severity: critical
        annotations:
          summary: 'CRITICAL: host root filesystem {{ printf "%.0f" $values.A.Value }}% used'
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              refId: A
              instant: true
              expr: >
                100 * (1 - node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"}
                / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"})
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [95] }


  # Log-based alerts (Loki datasource P8E80F9AEF21F6940). Catch failure modes that the
  # numeric RED metrics miss — broken cron, hard CRITICAL lines. Scoped to app services
  # on prod (service/env labels are unified across all 4 backends via promtail relabel;
  # see promtail-config.yml). Thresholds calibrated 2026-06-11 against a 7d Loki baseline:
  # scheduler failures ≈10/7d (all rusaifin), CRITICAL-level ≈1/7d → both high-signal.
  - orgId: 1
    name: russ360-logs
    folder: Russ360
    interval: 1m
    rules:
      - uid: russ360-log-scheduler-fail
        title: 'Scheduled command failing (cron broken)'
        condition: C
        for: 5m
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning
        annotations:
          summary: '{{ printf "%.0f" $values.A.Value }} scheduler failures in 30m (prod) — see Service debug dashboard / russ obs logs'
        data:
          - refId: A
            relativeTimeRange: { from: 1800, to: 0 }
            datasourceUid: P8E80F9AEF21F6940
            model:
              refId: A
              datasource: { type: loki, uid: P8E80F9AEF21F6940 }
              queryType: instant
              expr: >
                sum(count_over_time({service=~"rusaicore|rusaiauth|rusaisklad|rusaifin",env="prod"}
                |~ `(?i)scheduled command` |~ `(?i)fail|error|exception` [30m]))
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [3] }

      - uid: russ360-log-critical
        title: 'CRITICAL-level log line (prod app services)'
        condition: C
        for: 0m
        noDataState: OK
        execErrState: OK
        labels:
          severity: critical
        annotations:
          summary: '{{ printf "%.0f" $values.A.Value }} CRITICAL log lines in 5m (prod) — see Service debug dashboard / russ obs logs'
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: P8E80F9AEF21F6940
            model:
              refId: A
              datasource: { type: loki, uid: P8E80F9AEF21F6940 }
              queryType: instant
              expr: >
                sum(count_over_time({service=~"rusaicore|rusaiauth|rusaisklad|rusaifin",env="prod"}
                |~ `(?i)"level_name":"critical"|\bCRITICAL\b` [5m]))
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0] }

  # Dead-man switch for the interactive bot: delivered by Grafana (independent
  # path), so it still fires when obs-tgbot itself is down and cannot speak.
  - orgId: 1
    name: russ360-bot
    folder: Russ360
    interval: 1m
    rules:
      - uid: russ360-tgbot-down
        title: 'obs-tgbot не работает (интерактивный бот умер)'
        condition: C
        for: 5m
        noDataState: Alerting
        execErrState: OK
        labels:
          severity: critical
          # Routed straight to telegram (NOT through the bot's webhook): when the bot
          # is down its /alert endpoint is down too, so this must bypass triage.
          deadman: 'true'
        annotations:
          summary: 'Интерактивный бот obs-tgbot не виден cAdvisor — команды/отчёты/watchdog не работают. docker logs obs-tgbot'
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              refId: A
              instant: true
              expr: '(time() - max(container_last_seen{name="obs-tgbot"})) or vector(99999)'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [300] }

  - orgId: 1
    name: russ360-frontend
    folder: Russ360
    interval: 1m
    rules:
      - uid: russ360-frontend-down
        title: 'Фронт не грузится (probe_success=0)'
        condition: C
        for: 2m
        noDataState: OK
        execErrState: OK
        labels:
          severity: critical
        annotations:
          summary: '{{ $labels.instance }}: сайт не отвечает/не отдаётся (down, 5xx, TLS или белый экран — пустой shell)'
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              refId: A
              instant: true
              expr: 'probe_success{job=~"blackbox-frontend.*"}'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [1] }

      - uid: russ360-frontend-5xx
        title: 'Фронт отвечает 5xx'
        condition: C
        for: 1m
        noDataState: OK
        execErrState: OK
        labels:
          severity: critical
        annotations:
          summary: '{{ $labels.instance }}: HTTP {{ printf "%.0f" $values.A.Value }} (серверная ошибка фронта)'
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              refId: A
              instant: true
              expr: 'probe_http_status_code{job=~"blackbox-frontend.*"}'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [499] }

      - uid: russ360-frontend-cert-expiry
        title: 'TLS-сертификат фронта истекает (<10 дней)'
        condition: C
        for: 30m
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning
        annotations:
          summary: '{{ $labels.instance }}: TLS-сертификат истекает через {{ printf "%.1f" $values.A.Value }} дн.'
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              refId: A
              instant: true
              expr: '(probe_ssl_earliest_cert_expiry{job=~"blackbox-frontend.*"} - time()) / 86400'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [10] }
