apiVersion: 1

# Route everything to Telegram. Critical alerts get a tighter repeat interval.
policies:
  - orgId: 1
    receiver: telegram-russ360
    group_by: ['alertname', 'service', 'env']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: telegram-russ360
        matchers:
          - severity = critical
        group_wait: 10s
        repeat_interval: 1h
