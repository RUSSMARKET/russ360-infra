apiVersion: 1

# Telegram contact point. Token + chat id come from env (set in observability .env on the
# server, NOT committed). Grafana expands ${VAR} in provisioning when the vars are present
# in its environment — they are injected via compose env (see compose.yml grafana service).
contactPoints:
  - orgId: 1
    name: telegram-russ360
    receivers:
      - uid: telegram-russ360
        type: telegram
        settings:
          bottoken: ${GF_TELEGRAM_BOT_TOKEN}
          chatid: ${GF_TELEGRAM_CHAT_ID}
        disableResolveMessage: false
