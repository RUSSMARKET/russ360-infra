apiVersion: 1

# Telegram contact point.
#   bottoken — secret → from env (GF_TELEGRAM_BOT_TOKEN in observability .env, NOT committed).
#              A bot token (digits:alnum) stays a string after Grafana env-expansion.
#   chatid   — NOT secret → hardcoded. Grafana re-types an env-expanded numeric value into a
#              number and rejects it (must be string), so the chat id is inlined here.
#              Target chat: Telegram group "RSM Infra".
contactPoints:
  - orgId: 1
    name: telegram-russ360
    receivers:
      - uid: telegram-russ360
        type: telegram
        settings:
          bottoken: "${GF_TELEGRAM_BOT_TOKEN}"
          chatid: "-1004410412578"
        disableResolveMessage: false

  # Alerts are delivered to the interactive bot (obs-tgbot) instead of straight to
  # telegram: the bot pre-filters noise, asks the agent to triage, and posts a short
  # human-readable verdict with links. obs-tgbot and obs-grafana share the default
  # observability network, so the container DNS name resolves internally (no host port).
  # The dead-man switch (russ360-tgbot-down) stays on telegram-russ360 — see policies.yaml.
  - orgId: 1
    name: tgbot-triage
    receivers:
      - uid: tgbot-triage
        type: webhook
        settings:
          url: "http://obs-tgbot:8090/alert"
          httpMethod: "POST"
        disableResolveMessage: false
