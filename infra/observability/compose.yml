name: observability

# ─── Все контейнеры группируются через ─────────────────────────────────
#   1. compose project name: "observability"            → docker ps --filter label=com.docker.compose.project=observability
#   2. container_name prefix: "obs-"                    → видно в любом UI/CLI
#   3. labels stack=observability tier=<category>       → docker ps --filter label=stack=observability
# ───────────────────────────────────────────────────────────────────────

networks:
  default:
    name: observability_net
    driver: bridge
  # prod app-networks — obs-agent attaches read-only to reach the pg containers
  # by name for the db.query tool (SELECT-only user).
  rusaicore_prod_net:
    external: true
    name: rusaicore_back_prod_app-network
  rusaisklad_prod_net:
    external: true
    name: rusaisklad_back_prod_app-network
  rusaiauth_prod_net:
    external: true
    name: rusaiauth_back_prod_app-network

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
  glitchtip_pg_data:
  glitchtip_uploads:

x-common-labels: &common-labels
  stack: observability

x-glitchtip-env: &glitchtip-env
  DATABASE_URL: postgres://glitchtip:${GLITCHTIP_DB_PASSWORD}@obs-glitchtip-postgres:5432/glitchtip
  SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
  REDIS_URL: redis://obs-glitchtip-redis:6379/0
  PORT: "8000"
  EMAIL_URL: ${GLITCHTIP_EMAIL_URL:-consolemail://}
  DEFAULT_FROM_EMAIL: ${GLITCHTIP_DEFAULT_FROM_EMAIL:-glitchtip@localhost}
  GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8050}
  CELERY_WORKER_AUTOSCALE: "1,3"
  CELERY_WORKER_MAX_TASKS_PER_CHILD: "10000"
  ENABLE_USER_REGISTRATION: ${ENABLE_USER_REGISTRATION:-True}

services:

  # ═════════════════════ METRICS ═════════════════════
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: obs-prometheus
    restart: unless-stopped
    user: root
    labels:
      <<: *common-labels
      tier: metrics
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "127.0.0.1:9090:9090"

  node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: obs-node-exporter
    restart: unless-stopped
    pid: host
    network_mode: host
    labels:
      <<: *common-labels
      tier: metrics
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro,rslave
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/.+|var/lib/docker/.+)($$|/)'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: obs-cadvisor
    restart: unless-stopped
    privileged: true
    labels:
      <<: *common-labels
      tier: metrics
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      - '--housekeeping_interval=15s'
      - '--store_container_labels=false'
      - '--whitelisted_container_labels=com.docker.compose.service,com.docker.compose.project'

  # ═════════════════════ LOGS ═════════════════════
  loki:
    image: grafana/loki:3.3.2
    container_name: obs-loki
    restart: unless-stopped
    user: root
    labels:
      <<: *common-labels
      tier: logs
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "127.0.0.1:3100:3100"

  promtail:
    image: grafana/promtail:3.3.2
    container_name: obs-promtail
    restart: unless-stopped
    depends_on: [loki]
    labels:
      <<: *common-labels
      tier: logs
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ${RUSAIFIN_PROD_LOGS:-/tmp/empty-prod}:/var/log/rusaifin-prod:ro
      - ${RUSAIFIN_DEV_LOGS:-/tmp/empty-dev}:/var/log/rusaifin-dev:ro
    command: -config.file=/etc/promtail/promtail-config.yml -config.expand-env=true
    environment:
      HOSTNAME: ${OBS_HOSTNAME:-local}

  # ═════════════════════ UI ═════════════════════
  grafana:
    image: grafana/grafana:11.4.0
    container_name: obs-grafana
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
    restart: unless-stopped
    depends_on: [prometheus, loki]
    labels:
      <<: *common-labels
      tier: ui
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-http://localhost:3030}
      # Telegram bot token (secret) for the provisioned contact point. Non-empty placeholder
      # default: Grafana crash-loops on an EMPTY Telegram token at provisioning time; with a
      # placeholder it boots healthy and delivery just fails (logged) until a real token is set
      # in .env. The chat id is NOT secret and is inlined in contactpoints.yaml (Grafana mis-types
      # an env-expanded numeric chat id as a number and rejects it).
      GF_TELEGRAM_BOT_TOKEN: ${GF_TELEGRAM_BOT_TOKEN:-0000000000:PLACEHOLDER-set-real-token-in-env}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards-json:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3030:3000"

  # ═════════════════════ ERRORS (GlitchTip) ═════════════════════
  glitchtip-postgres:
    image: postgres:16-alpine
    container_name: obs-glitchtip-postgres
    restart: unless-stopped
    labels:
      <<: *common-labels
      tier: errors
    environment:
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${GLITCHTIP_DB_PASSWORD}
      POSTGRES_DB: glitchtip
    volumes:
      - glitchtip_pg_data:/var/lib/postgresql/data

  glitchtip-redis:
    image: redis:7-alpine
    container_name: obs-glitchtip-redis
    restart: unless-stopped
    labels:
      <<: *common-labels
      tier: errors

  glitchtip-migrate:
    image: glitchtip/glitchtip:v4.1
    container_name: obs-glitchtip-migrate
    restart: "no"
    depends_on: [glitchtip-postgres, glitchtip-redis]
    labels:
      <<: *common-labels
      tier: errors
    environment: *glitchtip-env
    command: ./bin/run-migrate.sh

  glitchtip-web:
    image: glitchtip/glitchtip:v4.1
    container_name: obs-glitchtip-web
    restart: unless-stopped
    depends_on:
      glitchtip-postgres:
        condition: service_started
      glitchtip-redis:
        condition: service_started
      glitchtip-migrate:
        condition: service_completed_successfully
    labels:
      <<: *common-labels
      tier: errors
    environment: *glitchtip-env
    volumes:
      - glitchtip_uploads:/code/uploads
    ports:
      - "127.0.0.1:8050:8000"

  glitchtip-worker:
    image: glitchtip/glitchtip:v4.1
    container_name: obs-glitchtip-worker
    restart: unless-stopped
    depends_on:
      glitchtip-postgres:
        condition: service_started
      glitchtip-redis:
        condition: service_started
      glitchtip-migrate:
        condition: service_completed_successfully
    labels:
      <<: *common-labels
      tier: errors
    environment: *glitchtip-env
    command: ./bin/run-celery-with-beat.sh
    volumes:
      - glitchtip_uploads:/code/uploads

  # ═════════════════════ INTERACTIVE BOT ═════════════════════
  # Same telegram bot Grafana delivers alerts through; this container adds the
  # interactive side (commands, daily 17:20 MSK report, watchdog, deploy feed,
  # subscription-backed AI answers). Host cron writes deploy/drift data into
  # /var/lib/russ360-botdata (see ../../scripts/deploy-drift-check.sh).
  tgbot:
    build: ./tgbot
    container_name: obs-tgbot
    restart: unless-stopped
    depends_on: [prometheus, loki, grafana]
    labels:
      <<: *common-labels
      tier: bot
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
    environment:
      TELEGRAM_BOT_TOKEN: ${GF_TELEGRAM_BOT_TOKEN:?set in .env}
      TG_CHAT_ID: ${TG_CHAT_ID:?set in .env}
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      # Out-of-RU forward proxy for the claude subprocess only (api.anthropic.com is
      # geo-blocked from timeweb). Empty -> AI calls go direct (and will 403 from RU).
      ANTHROPIC_PROXY: ${ANTHROPIC_PROXY:-}
      TZ: Europe/Moscow
    volumes:
      - /var/lib/russ360-botdata:/data
      # shared memory volume — bot auto-captures episodic Q/A here for the agent
      - /var/lib/russ360-agentmem:/memory

  # ═════════════════════ READ-ONLY INVESTIGATOR AGENT ═════════════════════
  # Hardened Claude Code agent with read-only access to prod source code.
  # obs-tgbot calls it over the internal network (POST /ask) and delivers the
  # answer to the access-controlled chat. The agent itself has NO telegram token
  # and NO outbound path except the claude subprocess via the Anthropic proxy.
  # Prod code is bind-mounted read-only under /prod, SUBDIRECTORIES ONLY — the
  # repo roots (and thus every .env*) are never mounted; bootstrap/ is excluded
  # because bootstrap/cache/config.php inlines resolved secrets.
  agent:
    build: ./agent
    container_name: obs-agent
    restart: unless-stopped
    labels:
      <<: *common-labels
      tier: bot
    networks: [default, rusaicore_prod_net, rusaisklad_prod_net, rusaiauth_prod_net]
    environment:
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ANTHROPIC_PROXY: ${ANTHROPIC_PROXY:-}
      AGENT_MODEL: ${AGENT_MODEL:-sonnet}
      # SELECT-only DB user (created on prod, Phase 3); empty -> db.query disabled.
      DB_RO_PASSWORD: ${DB_RO_PASSWORD:-}
      # read-only client_credentials for rusaiauth SMS analytics (Phase 4); the tool
      # exposes only GET sms endpoints. Empty -> sms tools disabled.
      OBS_AGENT_CLIENT_ID: ${OBS_AGENT_CLIENT_ID:-}
      OBS_AGENT_CLIENT_SECRET: ${OBS_AGENT_CLIENT_SECRET:-}
      TZ: Europe/Moscow
    volumes:
      # agent's own durable memory (writable — the ONLY writable path; prod code is ro)
      - /var/lib/russ360-agentmem:/memory
      # read-only SELECT access to host MySQL (fintech_base) via socket
      - /run/mysqld/mysqld.sock:/run/mysqld/mysqld.sock
      # rusaifin (host PHP) — code + file logs
      - /home/fintech/web/server.rusaifin.ru/public_html/app:/prod/rusaifin/app:ro
      - /home/fintech/web/server.rusaifin.ru/public_html/config:/prod/rusaifin/config:ro
      - /home/fintech/web/server.rusaifin.ru/public_html/routes:/prod/rusaifin/routes:ro
      - /home/fintech/web/server.rusaifin.ru/public_html/database:/prod/rusaifin/database:ro
      - /home/fintech/web/server.rusaifin.ru/public_html/resources:/prod/rusaifin/resources:ro
      - /home/fintech/web/server.rusaifin.ru/public_html/storage/logs:/prod/rusaifin/storage/logs:ro
      # rusaicore
      - /home/Rusaicore/web/server.rusaicore.ru/public_html/app:/prod/rusaicore/app:ro
      - /home/Rusaicore/web/server.rusaicore.ru/public_html/config:/prod/rusaicore/config:ro
      - /home/Rusaicore/web/server.rusaicore.ru/public_html/routes:/prod/rusaicore/routes:ro
      - /home/Rusaicore/web/server.rusaicore.ru/public_html/database:/prod/rusaicore/database:ro
      - /home/Rusaicore/web/server.rusaicore.ru/public_html/resources:/prod/rusaicore/resources:ro
      # rusaisklad
      - /home/Rusaisklad/web/server.rusaisklad.ru/public_html/app:/prod/rusaisklad/app:ro
      - /home/Rusaisklad/web/server.rusaisklad.ru/public_html/config:/prod/rusaisklad/config:ro
      - /home/Rusaisklad/web/server.rusaisklad.ru/public_html/routes:/prod/rusaisklad/routes:ro
      - /home/Rusaisklad/web/server.rusaisklad.ru/public_html/database:/prod/rusaisklad/database:ro
      - /home/Rusaisklad/web/server.rusaisklad.ru/public_html/resources:/prod/rusaisklad/resources:ro
      # rusaiauth
      - /home/Rusaiauth/web/sso.rusaifin.ru/app:/prod/rusaiauth/app:ro
      - /home/Rusaiauth/web/sso.rusaifin.ru/config:/prod/rusaiauth/config:ro
      - /home/Rusaiauth/web/sso.rusaifin.ru/routes:/prod/rusaiauth/routes:ro
      - /home/Rusaiauth/web/sso.rusaifin.ru/database:/prod/rusaiauth/database:ro
      - /home/Rusaiauth/web/sso.rusaifin.ru/resources:/prod/rusaiauth/resources:ro
      # frontends (Nuxt source only — src/, no node_modules/.output/dist, no root .env)
      - /home/fintech/web/fintech.rusaifin.ru/public_html/src:/prod/fintech-front/src:ro
      - /home/Rusaisklad/web/rusaisklad.ru/public_html/src:/prod/sklad-front/src:ro
      - /home/Rusaisklad/web/rusaisklad.ru/public_html/components:/prod/sklad-front/components:ro
      # infra (monitoring repo)
      - /root/russ360-infra:/prod/infra:ro

  # ═════════════════════ SYNTHETIC PROBES ═════════════════════
  blackbox:
    image: prom/blackbox-exporter:v0.25.0
    container_name: obs-blackbox
    restart: unless-stopped
    labels:
      <<: *common-labels
      tier: metrics
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'
    ports:
      - "127.0.0.1:9115:9115"
